name: Get Notes Written

on:
  workflow_dispatch:
    inputs:
      num_posts:
        description: "Number of eligible notes"
        required: false
        default: "10"
      test_mode:
        description: "Use test_mode"
        required: false
        default: "true"
  # schedule:
  #   - cron: "0 * * * *"

jobs:
  run-note-writer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run writer
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          AI_PROVIDER: ${{ vars.AI_PROVIDER }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ vars.AI_BASE_URL }}
          AI_MODEL: ${{ vars.AI_MODEL }}
        run: |
          ai-note-writer notes \
            --num-posts "${{ github.event.inputs.num_posts || '10' }}" \
            --test-mode=${{ github.event.inputs.test_mode || 'true' }} \

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: writer-outputs
          path: outputs/
          if-no-files-found: ignore